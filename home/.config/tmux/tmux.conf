# =============================================================================
# Tmux Configuration — Tokyo Night (Clean Flat)
# =============================================================================

# --- Terminal & Color --------------------------------------------------------
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"          # True color support
set -ga terminal-overrides '*:Ss=\E[%p1%d q:Se=\E[ q'  # Cursor shape passthrough
set -g xterm-keys on                                # Pass xterm-style function keys

# --- General Settings --------------------------------------------------------
set -g base-index 1               # Start window numbering at 1
set -g pane-base-index 1          # Start pane numbering at 1
set -g renumber-windows on        # Renumber windows when one is closed
set -g escape-time 10             # Faster command recognition
set -g history-limit 50000        # Lots of scrollback
set -g display-time 2000          # Message display duration (ms)
set -g focus-events on            # Pass focus events to terminal
set -g set-titles on              # Update terminal title
set -g set-titles-string "#S:#W"  # Terminal title format

# --- Mouse -------------------------------------------------------------------
set -g mouse on

# --- Vi Copy Mode ------------------------------------------------------------
set -g mode-keys vi
set -g mode-style "fg=#c0caf5,bg=#292e42,bold"     # Selection style

bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi V send-keys -X select-line
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi Y send-keys -X copy-line
bind -T copy-mode-vi r send-keys -X rectangle-toggle

# System clipboard integration (Linux: xclip/xsel, macOS: pbcopy)
if-shell "command -v pbcopy >/dev/null 2>&1" {
    bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
}
if-shell "command -v xclip >/dev/null 2>&1" {
    bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -sel clip"
}
if-shell "command -v wl-copy >/dev/null 2>&1" {
    bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "wl-copy"
}

# --- Container Detection -----------------------------------------------------
set -g @in_container "0"
if-shell "test -f /.dockerenv || test -n \"$container\" || grep -qE '(docker|lxc|containerd|/podman)' /proc/1/cgroup 2>/dev/null" {
    set -g @in_container "1"
}

# =============================================================================
# Key Bindings
# =============================================================================

# Prefix — Ctrl-b
set -g prefix C-b
set -gu prefix2
unbind C-b
bind C-b send-prefix

# --- Reload Config -----------------------------------------------------------
bind r source-file ~/.config/tmux/tmux.conf \; display "✅ Config reloaded"

# --- Pane Splitting (keep current directory) ---------------------------------
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind _ split-window -v -c "#{pane_current_path}"
bind \\ split-window -h -c "#{pane_current_path}"    # Alternative: backslash

# --- Pane Navigation (vim-style) ---------------------------------------------
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R
# Fallback: if Ctrl is still held after prefix, these still work.
# C-j / C-k are intentionally left out — they're used for session switching below.
bind -r C-h select-pane -L
bind -r C-l select-pane -R

# --- Pane Resizing (hold prefix + HJKL) --------------------------------------
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
# Fallback: if Ctrl is still held after prefix, these still work
bind -r C-H resize-pane -L 5
bind -r C-J resize-pane -D 5
bind -r C-K resize-pane -U 5
bind -r C-L resize-pane -R 5

# --- Window Management -------------------------------------------------------
bind c new-window -c "#{pane_current_path}"          # New window at same dir
bind n next-window
bind p previous-window
# Fallback: if Ctrl is still held after prefix, these still work
bind C-n next-window
bind C-p previous-window
bind , command-prompt -I "#W" "rename-window '%%'"
bind . command-prompt -I "#S" "rename-session '%%'"
bind x confirm-before -p "kill-window #W? (y/n)" kill-window
bind '$' command-prompt -I "#S" "rename-session '%%'"

# --- Synchronize Panes Toggle ------------------------------------------------
bind S setw synchronize-panes \; display "synchronize-panes #{?synchronize-panes,on,off}"

# --- Zoom Pane ---------------------------------------------------------------
bind z resize-pane -Z

# --- Break Pane into Window --------------------------------------------------
bind ! break-pane

# --- Swap Windows ------------------------------------------------------------
bind -r '<' swap-window -d -t -1
bind -r '>' swap-window -d -t +1

# --- Quick Session Switch ----------------------------------------------------
bind C-j switch-client -n
bind C-k switch-client -p

# =============================================================================
# Status Bar — Tokyo Night
# =============================================================================

# --- Shared Status Bar Settings ----------------------------------------------
set -g status-interval 5
set -g status-left-length 60
set -g status-right-length 120
set -g status-justify centre
set -g status-position bottom

# --- Pane Borders ------------------------------------------------------------
set -g pane-border-style "fg=#292e42,bg=default"
set -g pane-active-border-style "fg=#7aa2f7,bg=default"

# --- Window tabs (shared between environments) --------------------------------
set -g window-status-format " #[bg=#292e42,fg=#565f89] #I:#W#{?window_flags,#{window_flags},} "
set -g window-status-current-format " #[bg=#7aa2f7,fg=#1a1b26,bold] #I:#W#{?window_flags,#{window_flags},} "
set -g window-status-separator ""
set -g window-status-activity-style "fg=#e0af68,bg=#292e42"
set -g window-status-bell-style "fg=#f7768e,bg=#292e42,bold"

# --- Local Environment: Tokyo Night ------------------------------------------
if-shell "test \"#{@in_container}\" != 1" {
    # Status bar background
    set -g status-bg "#1a1b26"
    set -g status-fg "#c0caf5"

    # Left: session → hostname (flat, no arrows)
    set -g status-left "\
#[bg=#9ece6a,fg=#1a1b26,bold]  #S  \
#[bg=#1a1b26,fg=#c0caf5] #h \
#[bg=#1a1b26,fg=#565f89]  "

    # Right: directory → time (flat)
    set -g status-right "\
#[bg=#1a1b26,fg=#c0caf5] #{b:pane_current_path}  \
#[bg=#1a1b26,fg=#565f89] │ \
#[bg=#1a1b26,fg=#bb9af7,bold] #(date +%%R)  \
#[bg=#1a1b26] "

    # Pane borders
    set -g pane-border-style "fg=#292e42,bg=default"
    set -g pane-active-border-style "fg=#7aa2f7,bg=default"

    # Menu/popup styling
    set -g menu-style "fg=#c0caf5,bg=#1a1b26"
    set -g menu-selected-style "fg=#1a1b26,bg=#7aa2f7"
    set -g menu-border-style "fg=#7aa2f7"

    # Message styling
    set -g message-style "fg=#c0caf5,bg=#292e42"
    set -g message-command-style "fg=#c0caf5,bg=#292e42"

    # Mode (copy/choice) styling
    set -g mode-style "fg=#c0caf5,bg=#292e42,bold"
}

# --- Container Environment: Tokyo Night (cyan accent) -------------------------
if-shell "test \"#{@in_container}\" = 1" {
    # Status bar background
    set -g status-bg "#1a1b26"
    set -g status-fg "#c0caf5"

    # Left: session → hostname (flat, no arrows)
    set -g status-left "\
#[bg=#ff9e64,fg=#1a1b26,bold]  #S  \
#[bg=#1a1b26,fg=#c0caf5] #h \
#[bg=#1a1b26,fg=#565f89]  "

    # Right: container badge → directory → time (flat)
    set -g status-right "\
#[bg=#1a1b26,fg=#565f89] #(~/.config/tmux/detect-container-icon.sh) \
#[bg=#1a1b26,fg=#c0caf5] #{b:pane_current_path}  \
#[bg=#1a1b26,fg=#565f89] │ \
#[bg=#1a1b26,fg=#bb9af7,bold] #(date +%%R)  \
#[bg=#1a1b26] "

    # Pane borders
    set -g pane-border-style "fg=#292e42,bg=default"
    set -g pane-active-border-style "fg=#7dcfff,bg=default"

    # Menu/popup styling
    set -g menu-style "fg=#c0caf5,bg=#1a1b26"
    set -g menu-selected-style "fg=#1a1b26,bg=#7dcfff"
    set -g menu-border-style "fg=#7dcfff"

    # Message styling
    set -g message-style "fg=#c0caf5,bg=#292e42"
    set -g message-command-style "fg=#c0caf5,bg=#292e42"

    # Mode styling
    set -g mode-style "fg=#c0caf5,bg=#292e42,bold"

    # Window tabs — container variant
    set -g window-status-current-format " #[bg=#7dcfff,fg=#1a1b26,bold] #I:#W#{?window_flags,#{window_flags},} "
    set -g window-status-format " #[bg=#292e42,fg=#565f89] #I:#W#{?window_flags,#{window_flags},} "
    set -g window-status-activity-style "fg=#e0af68,bg=#292e42"
    set -g window-status-bell-style "fg=#f7768e,bg=#292e42,bold"
}

# =============================================================================
# Visual & Behavior Tweaks
# =============================================================================

# --- Visual activity/bell indicators -----------------------------------------
set -g visual-activity on
set -g visual-bell off
set -g visual-silence off
set -g bell-action current
set -g monitor-activity on

# --- Clock mode --------------------------------------------------------------
set -g clock-mode-colour "#7aa2f7"
set -g clock-mode-style 24

# --- Display panes (prefix + q) ----------------------------------------------
set -g display-panes-colour "#7aa2f7"
set -g display-panes-active-colour "#f7768e"

# --- Aggressive resize (resize window to smallest session) -------------------
set -g aggressive-resize on

# --- Detach on destroy (close session when last client detaches) --------------
set -g detach-on-destroy off
