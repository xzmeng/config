# =============================================================================
# Tmux Configuration — Catppuccin Mocha / Frappe Powerline
# =============================================================================

# --- Terminal & Color --------------------------------------------------------
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"          # True color support
set -ga terminal-overrides '*:Ss=\E[%p1%d q:Se=\E[ q'  # Cursor shape passthrough
set -g xterm-keys on                                # Pass xterm-style function keys

# --- General Settings --------------------------------------------------------
set -g base-index 1               # Start window numbering at 1
set -g pane-base-index 1          # Start pane numbering at 1
set -g renumber-windows on        # Renumber windows when one is closed
set -g escape-time 10             # Faster command recognition
set -g history-limit 50000        # Lots of scrollback
set -g display-time 2000          # Message display duration (ms)
set -g focus-events on            # Pass focus events to terminal
set -g set-titles on              # Update terminal title
set -g set-titles-string "#S:#W"  # Terminal title format

# --- Mouse -------------------------------------------------------------------
set -g mouse on

# --- Vi Copy Mode ------------------------------------------------------------
set -g mode-keys vi
set -g mode-style "fg=#cdd6f4,bg=#313244,bold"     # Selection style

bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi V send-keys -X select-line
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi Y send-keys -X copy-line
bind -T copy-mode-vi r send-keys -X rectangle-toggle

# System clipboard integration (Linux: xclip/xsel, macOS: pbcopy)
if-shell "command -v pbcopy >/dev/null 2>&1" {
    bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
}
if-shell "command -v xclip >/dev/null 2>&1" {
    bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -sel clip"
}
if-shell "command -v wl-copy >/dev/null 2>&1" {
    bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "wl-copy"
}

# --- Container Detection -----------------------------------------------------
set -g @in_container "0"
if-shell "test -f /.dockerenv || test -n \"$container\" || grep -qE '(docker|lxc|containerd|/podman)' /proc/1/cgroup 2>/dev/null" {
    set -g @in_container "1"
}

# =============================================================================
# Key Bindings
# =============================================================================

# Prefix — Ctrl-b
set -g prefix C-b
unbind C-b
bind C-b send-prefix

# --- Reload Config -----------------------------------------------------------
bind r source-file ~/.config/tmux/tmux.conf \; display "✅ Config reloaded"

# --- Pane Splitting (keep current directory) ---------------------------------
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind \\ split-window -h -c "#{pane_current_path}"    # Alternative: backslash

# --- Pane Navigation (vim-style) ---------------------------------------------
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# --- Pane Resizing (hold prefix + HJKL) --------------------------------------
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# --- Window Management -------------------------------------------------------
bind c new-window -c "#{pane_current_path}"          # New window at same dir
bind n next-window
bind p previous-window
bind , command-prompt -I "#W" "rename-window '%%'"
bind . command-prompt -I "#S" "rename-session '%%'"
bind x confirm-before -p "kill-window #W? (y/n)" kill-window
bind '$' command-prompt -I "#S" "rename-session '%%'"

# --- Synchronize Panes Toggle ------------------------------------------------
bind S setw synchronize-panes \; display "synchronize-panes #{?synchronize-panes,on,off}"

# --- Zoom Pane ---------------------------------------------------------------
bind z resize-pane -Z

# --- Break Pane into Window --------------------------------------------------
bind ! break-pane

# --- Swap Windows ------------------------------------------------------------
bind -r '<' swap-window -d -t -1
bind -r '>' swap-window -d -t +1

# --- Quick Session Switch ----------------------------------------------------
bind C-j switch-client -n
bind C-k switch-client -p

# =============================================================================
# Status Bar — Catppuccin Mocha (Local) / Frappe (Container)
# =============================================================================

# --- Shared Status Bar Settings ----------------------------------------------
set -g status-interval 5
set -g status-left-length 60
set -g status-right-length 120
set -g status-justify centre
set -g status-position bottom

# --- Pane Borders ------------------------------------------------------------
set -g pane-border-style "fg=#313244,bg=default"
set -g pane-active-border-style "fg=#b4befe,bg=default"

# --- Window tabs (shared between environments) --------------------------------
set -g window-status-format " #[bg=#313244,fg=#6c7086] #I:#W#{?window_flags,#{window_flags},} "
set -g window-status-current-format " #[bg=#94e2d5,fg=#11111b,bold] #I:#W#{?window_flags,#{window_flags},} "
set -g window-status-separator ""
set -g window-status-activity-style "fg=#f9e2af,bg=#313244"
set -g window-status-bell-style "fg=#f38ba8,bg=#313244,bold"

# --- Local Environment: Catppuccin Mocha -------------------------------------
if-shell "test \"#{@in_container}\" != 1" {
    # Status bar background
    set -g status-bg "#1e1e2e"
    set -g status-fg "#cdd6f4"

    # Left: session name → hostname → pane title
    set -g status-left "\
#[bg=#f38ba8,fg=#11111b]  #S \
#[bg=#fab387,fg=#11111b]#[bg=#fab387,fg=#11111b] 󰒋 #h \
#[bg=#f9e2af,fg=#11111b]#[bg=#f9e2af,fg=#11111b]  #W \
#[bg=#1e1e2e,fg=#f9e2af]"

    # Right: directory → time
    set -g status-right "\
#[bg=#94e2d5,fg=#11111b]  #{b:pane_current_path} \
#[bg=#b4befe,fg=#94e2d5]#[bg=#b4befe,fg=#11111b]  #(date +%%R) \
#[bg=#1e1e2e,fg=#b4befe]"

    # Pane borders
    set -g pane-border-style "fg=#313244,bg=default"
    set -g pane-active-border-style "fg=#b4befe,bg=default"

    # Menu/popup styling
    set -g menu-style "fg=#cdd6f4,bg=#1e1e2e"
    set -g menu-selected-style "fg=#1e1e2e,bg=#b4befe"
    set -g menu-border-style "fg=#b4befe"

    # Message styling
    set -g message-style "fg=#cdd6f4,bg=#313244"
    set -g message-command-style "fg=#cdd6f4,bg=#313244"

    # Mode (copy/choice) styling
    set -g mode-style "fg=#cdd6f4,bg=#313244,bold"
}

# --- Container Environment: Catppuccin Frappe --------------------------------
if-shell "test \"#{@in_container}\" = 1" {
    # Status bar background
    set -g status-bg "#303446"
    set -g status-fg "#c6d0f5"

    # Left: session name → hostname → pane title
    set -g status-left "\
#[bg=#eebebe,fg=#232634]  #S \
#[bg=#ef9f76,fg=#232634]#[bg=#ef9f76,fg=#232634] 󰒋 #h \
#[bg=#f4b8e4,fg=#232634]#[bg=#f4b8e4,fg=#232634]  #W \
#[bg=#303446,fg=#f4b8e4]"

    # Right: container badge → directory → time
    set -g status-right "\
#[bg=#f2d5cf,fg=#232634] #(~/.config/tmux/detect-container-icon.sh) \
#[bg=#ca9ee6,fg=#f2d5cf]#[bg=#ca9ee6,fg=#232634]  #{b:pane_current_path} \
#[bg=#babbf1,fg=#ca9ee6]#[bg=#babbf1,fg=#232634]  #(date +%%R) \
#[bg=#303446,fg=#babbf1]"

    # Pane borders
    set -g pane-border-style "fg=#414559,bg=default"
    set -g pane-active-border-style "fg=#85c1dc,bg=default"

    # Menu/popup styling
    set -g menu-style "fg=#c6d0f5,bg=#303446"
    set -g menu-selected-style "fg=#232634,bg=#babbf1"
    set -g menu-border-style "fg=#babbf1"

    # Message styling
    set -g message-style "fg=#c6d0f5,bg=#414559"
    set -g message-command-style "fg=#c6d0f5,bg=#414559"

    # Mode styling
    set -g mode-style "fg=#c6d0f5,bg=#414559,bold"

    # Window tabs — container variant
    set -g window-status-current-format " #[bg=#ca9ee6,fg=#232634,bold] #I:#W#{?window_flags,#{window_flags},} "
    set -g window-status-format " #[bg=#414559,fg=#737994] #I:#W#{?window_flags,#{window_flags},} "
    set -g window-status-activity-style "fg=#e5c890,bg=#414559"
    set -g window-status-bell-style "fg=#e78284,bg=#414559,bold"
}

# =============================================================================
# Visual & Behavior Tweaks
# =============================================================================

# --- Visual activity/bell indicators -----------------------------------------
set -g visual-activity on
set -g visual-bell on
set -g visual-silence off
set -g bell-action any
set -g monitor-activity on

# --- Clock mode --------------------------------------------------------------
set -g clock-mode-colour "#b4befe"
set -g clock-mode-style 24

# --- Display panes (prefix + q) ----------------------------------------------
set -g display-panes-colour "#b4befe"
set -g display-panes-active-colour "#f38ba8"

# --- Aggressive resize (resize window to smallest session) -------------------
set -g aggressive-resize on

# --- Detach on destroy (close session when last client detaches) --------------
set -g detach-on-destroy off
